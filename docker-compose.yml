services:
  gameverse:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./assets:/app/assets
    environment:
      - JAVA_OPTS=-Ddatabase.path=data/gameverse.db
    restart: always

